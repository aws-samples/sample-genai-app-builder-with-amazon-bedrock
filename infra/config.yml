# Configuration for genai-app-builder-with-amazon-bedrock
# Copy this file to config.yml and update the values below.

# Stack name prefix — used for all AWS resource names.
# Must be lowercase, alphanumeric + hyphens only.
stackName: "bd-vibe-final"

# AWS region to deploy into.
# Must support Amazon Bedrock with Claude models.
# See: https://docs.aws.amazon.com/bedrock/latest/userguide/models-regions.html
region: "us-west-2"
